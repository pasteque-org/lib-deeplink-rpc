name: deeplink_rpc_server_example
description: A DeeplinkRPC server app example.

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev
version: 1.0.0+2

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  deeplink_rpc:
    path: ../../

  flutter:
    sdk: flutter

  go_router: ^15.1.2

  logging: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  lints: ^5.1.1
  
flutter:
  uses-material-design: true
